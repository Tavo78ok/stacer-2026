<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11142b"/>
      <stop offset="100%" stop-color="#0d0f1a"/>
    </linearGradient>
    <!-- Accent ring gradient -->
    <linearGradient id="ring1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <!-- Inner glow -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>
    <!-- Chart line gradient -->
    <linearGradient id="chartfill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="chartfill2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#7c4dff" flood-opacity="0.4"/>
    </filter>
    <filter id="glowfilter">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip for chart area -->
    <clipPath id="chartclip">
      <rect x="96" y="270" width="320" height="130" rx="8"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Outer glow pulse ring (decorative) -->
  <circle cx="256" cy="200" r="148" fill="none" stroke="#7c4dff" stroke-width="1.5" stroke-opacity="0.18"/>
  <circle cx="256" cy="200" r="162" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.10"/>

  <!-- Inner radial glow -->
  <circle cx="256" cy="200" r="130" fill="url(#glow)"/>

  <!-- ── Gauge arc track ── -->
  <!-- Track (dark) -->
  <path d="M 116 230 A 145 145 0 1 1 396 230"
        fill="none" stroke="#262a55" stroke-width="22"
        stroke-linecap="round"/>

  <!-- Arc fill — purple to cyan gradient trick via two arcs -->
  <!-- Full arc using stroke-dasharray -->
  <path d="M 116 230 A 145 145 0 1 1 396 230"
        fill="none" stroke="url(#ring1)" stroke-width="22"
        stroke-linecap="round"
        stroke-dasharray="590" stroke-dashoffset="147"
        filter="url(#glowfilter)"/>

  <!-- Centre percentage text -->
  <text x="256" y="218" text-anchor="middle"
        font-family="Ubuntu, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="72" font-weight="700" fill="white" opacity="0.95">72%</text>

  <!-- CPU label under percentage -->
  <text x="256" y="252" text-anchor="middle"
        font-family="Ubuntu, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="22" font-weight="600" fill="#7c4dff" letter-spacing="3">CPU</text>

  <!-- ── Mini chart area ── -->
  <rect x="88" y="312" width="336" height="118" rx="14" fill="#181b35" stroke="#262a55" stroke-width="1.5"/>

  <!-- Chart bars background grid lines -->
  <line x1="88" y1="345" x2="424" y2="345" stroke="#262a55" stroke-width="1" stroke-dasharray="4 6"/>
  <line x1="88" y1="375" x2="424" y2="375" stroke="#262a55" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- RAM chart filled area (cyan) -->
  <polygon
    points="96,420  116,400  136,385  156,392  176,378  196,368  216,380  236,360  256,352  276,365  296,355  316,370  336,348  356,360  376,355  396,362  416,358  416,420"
    fill="url(#chartfill2)" clip-path="url(#chartclip)"/>
  <!-- RAM line -->
  <polyline
    points="96,400  116,400  136,385  156,392  176,378  196,368  216,380  236,360  256,352  276,365  296,355  316,370  336,348  356,360  376,355  396,362  416,358"
    fill="none" stroke="#00e5ff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
    clip-path="url(#chartclip)"/>

  <!-- CPU chart filled area (purple) -->
  <polygon
    points="96,420  116,395  136,405  156,380  176,395  196,370  216,360  236,375  256,345  276,358  296,340  316,362  336,335  356,350  376,340  396,348  416,338  416,420"
    fill="url(#chartfill)" clip-path="url(#chartclip)"/>
  <!-- CPU line -->
  <polyline
    points="96,395  116,395  136,405  156,380  176,395  196,370  216,360  236,375  256,345  276,358  296,340  316,362  336,335  356,350  376,340  396,348  416,338"
    fill="none" stroke="#7c4dff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
    clip-path="url(#chartclip)"/>

  <!-- Chart legend dots -->
  <circle cx="112" cy="320" r="5" fill="#7c4dff"/>
  <text x="122" y="324" font-family="Ubuntu, sans-serif" font-size="13" fill="#6b6f9a">CPU</text>
  <circle cx="165" cy="320" r="5" fill="#00e5ff"/>
  <text x="175" y="324" font-family="Ubuntu, sans-serif" font-size="13" fill="#6b6f9a">RAM</text>

  <!-- ── STACER wordmark at bottom ── -->
  <text x="256" y="464" text-anchor="middle"
        font-family="Ubuntu, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="30" font-weight="700" fill="#7c4dff"
        letter-spacing="8" opacity="0.9">STACER</text>
  <text x="256" y="484" text-anchor="middle"
        font-family="Ubuntu, sans-serif"
        font-size="13" fill="#6b6f9a" letter-spacing="2">2026</text>
</svg>
